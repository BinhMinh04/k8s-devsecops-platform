name: CI Security Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────
  # GATE 1: Secret scanning
  # ─────────────────────────────────────────
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # cần full history để scan toàn bộ commit
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LOG_OPTS: --all

  # ─────────────────────────────────────────
  # GATE 2: SAST
  # ─────────────────────────────────────────
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: semgrep/semgrep-action@v1
        with:
          config: auto

  # ─────────────────────────────────────────
  # GATE 3: SCA — dependency scan
  # ─────────────────────────────────────────
  sca:
    name: SCA (Trivy filesystem)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'          # fail pipeline nếu tìm thấy

  # ─────────────────────────────────────────
  # BUILD + GATE 4: Image scan + GATE 5: Sign
  # (chỉ chạy sau khi 3 gate trên xanh hết)
  # ─────────────────────────────────────────
  build-scan-push:
    name: 🏗️ Build → Scan → Sign → Push
    runs-on: ubuntu-latest
    needs: [secret-scan, sast, sca]   # ← phụ thuộc 3 gate trên
    permissions:
      contents: read
      packages: write               # để push ghcr.io
      id-token: write               # để Cosign ký keyless

    steps:
      - uses: actions/checkout@v4
        with:
            fetch-depth: 0 

      # GHCR yêu cầu repository path phải lowercase.
      # github.repository = "BinhMinh04/..." (có chữ hoa) → hạ về chữ thường,
      # ghi đè env.IMAGE_NAME cho các step sau trong job này.
      - name: Lowercase image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      # Setup buildx để build multi-arch
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Đăng nhập ghcr.io
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build & push image (arm64 + amd64)
      - name: Build and push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./app
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      # GATE 4: Scan image vừa push
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          severity: CRITICAL
          exit-code: '1'

      # GATE 5: Ký image bằng Cosign (keyless — dùng OIDC GitHub)
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}

      # Sinh SBOM (Software Bill of Materials)
      - name: Install Syft
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: spdx-json
          output-file: sbom.json

      # Upload SBOM làm artifact của workflow
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json